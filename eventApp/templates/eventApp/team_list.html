<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Team List</title>
    <link rel="stylesheet" href="{% static 'css/styles.css' %}">  <!-- Optional CSS file -->
</head>
<body>
    <h1>Teams</h1>

    <a href="{% url 'team_create' %}">Create New Team</a>  <!-- Link to create a new team -->

    <table>
        <thead>
            <tr>
                <th>Team Name</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody>
            {% for team in teams %}
                <tr>
                    <td><a href="{% url 'team_detail' team.pk %}">{{ team.name }}</a></td>
                    <td>
                        <a href="{% url 'team_update' team.pk %}">Edit</a> |
                        <a href="{% url 'team_delete' team.pk %}">Delete</a>
                    </td>
                </tr>
            {% empty %}
                <tr>
                    <td colspan="2">No teams available.</td>
                </tr>
            {% endfor %}
        </tbody>
    </table>
</body>
</html>
